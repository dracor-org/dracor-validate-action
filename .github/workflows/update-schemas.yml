name: Update schemas

on:
  repository_dispatch:
    types: [dracor-schema-released]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Check for new schema versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        id: update
        run: node scripts/update-schemas.mjs | tee /tmp/summary.txt

      - name: Detect changes
        id: check
        run: |
          if grep -qx 'NO_UPDATES' /tmp/summary.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate dist/
        if: steps.check.outputs.changed == 'true'
        run: npm run bundle

      - name: Open pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: automation/update-schemas
          title: "Update schemas"
          body-path: /tmp/summary.txt
          commit-message: "Update schemas"
          delete-branch: true
